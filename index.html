<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whiteboard</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="toolbar" aria-label="Drawing tools">
        <button class="tool active" data-color="#000000" type="button">Black</button>
        <button class="tool" data-color="#1f6feb" type="button">Blue</button>
        <button class="tool" data-color="#2ea043" type="button">Green</button>
        <button class="tool" data-color="#cf222e" type="button">Red</button>
        <button class="tool" id="eraser" type="button">Eraser</button>
        <button class="tool clear" id="clear-board" type="button">Clear</button>
      </section>
      <canvas id="whiteboard" aria-label="Drawing area"></canvas>
    </main>
    <script src="script.js"></script>
  </body>
</html>
